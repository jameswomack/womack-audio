<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1280, initial-scale=1" />
  <title>Womack FX Social Preview</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1280px;
      height: 640px;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at 12% 15%, rgba(255,107,107,.34), transparent 28%),
        radial-gradient(circle at 86% 18%, rgba(87,230,255,.28), transparent 26%),
        linear-gradient(135deg, #12091f 0%, #1b1032 44%, #0c162c 100%);
      color: #f7f8ff;
    }
    .frame {
      position: relative;
      width: 1280px;
      height: 640px;
      padding: 48px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 26px;
    }
    .brand img {
      width: 76px;
      height: 76px;
      filter: drop-shadow(0 10px 24px rgba(0, 0, 0, .35));
    }
    .brand-name {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: .04em;
    }
    .layout {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 32px;
      align-items: center;
    }
    .kicker {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .06em;
      color: #ffe0b9;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      margin-bottom: 18px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 76px;
      line-height: .94;
      letter-spacing: -.04em;
    }
    .subtitle {
      margin: 0 0 26px;
      font-size: 28px;
      line-height: 1.25;
      color: #d4dbf2;
      max-width: 600px;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: #f7f8ff;
      font-weight: 700;
      font-size: 16px;
    }
    .shot-wrap {
      position: relative;
      height: 430px;
    }
    .glow {
      position: absolute;
      inset: 36px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255,107,107,.36), rgba(87,230,255,.24));
      filter: blur(40px);
      transform: rotate(-5deg);
    }
    .shot {
      position: relative;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 24px 60px rgba(0,0,0,.42);
    }
    .footer {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #b9c3de;
      font-size: 18px;
      font-weight: 600;
    }
    .signal { color: #ffdca8; }
  </style>
</head>
<body>
  <main class="frame">
    <section class="brand">
      <img src="womackfx-mark.svg" alt="Womack FX logo" />
      <div class="brand-name">WOMACK FX</div>
    </section>
    <section class="layout">
      <div>
        <div class="kicker">OPEN-SOURCE MULTI-FX PLUGIN</div>
        <h1>Fuzz. Swirl.<br>Echo. Glow.</h1>
        <p class="subtitle">A vivid, tape-soaked chain for guitars, synths, drums, and anything that deserves more motion, grit, and character.</p>
        <div class="chips">
          <div class="chip">AU</div>
          <div class="chip">VST3</div>
          <div class="chip">Standalone</div>
          <div class="chip">C++20</div>
          <div class="chip">JUCE 8</div>
          <div class="chip">MIT</div>
        </div>
      </div>
      <div class="shot-wrap">
        <div class="glow"></div>
        <img class="shot" src="womackfx-ui-screenshot.png" alt="Womack FX UI screenshot" />
      </div>
    </section>
    <div class="footer">
      <div class="signal">FUZZ → UNIVIBE → TAPE DELAY</div>
      <div>github.com/jameswomack/womack-audio</div>
    </div>
  </main>
</body>
</html>
